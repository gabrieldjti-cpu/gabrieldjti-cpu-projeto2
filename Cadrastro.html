<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Profissional</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="container">
    <section class="form-section" aria-label="Cadastro de profissional">

      <h1>Cadastro de Profissional</h1>

      <form>

        <!-- Dados pessoais -->
        <fieldset>
          <legend>Dados pessoais</legend>

          <label for="nome">Nome completo</label>
          <input type="text" id="nome" name="nome" required aria-label="Nome completo">

          <label for="profissao">Profissão</label>
          <select id="profissao" name="profissao" required aria-label="Profissão">
            <option value="">Selecione</option>
            <option value="faxineiro">Faxineiro</option>
            <option value="eletricista">Eletricista</option>
            <option value="encanador">Encanador</option>
            <option value="programador">Programador</option>
          </select>

          <label for="cidade">Cidade</label>
          <input type="text" id="cidade" name="cidade" required aria-label="Cidade">

          <label for="telefone">Telefone</label>
          <input type="tel" id="telefone" name="telefone" required aria-label="Telefone">

        </fieldset>

        <!-- Informações profissionais -->
        <fieldset>
          <legend>Informações profissionais</legend>

          <label for="descricao">Descrição</label>
          <textarea id="descricao" name="descricao" rows="4" aria-label="Descrição sobre o profissional"></textarea>

          <label for="experiencia">Anos de experiência</label>
          <input type="number" id="experiencia" name="experiencia" aria-label="Anos de experiência">

          <label for="preco">Preço médio (R$)</label>
          <input type="number" id="preco" name="preco" aria-label="Preço médio">

        </fieldset>

        <!-- Conta -->
        <fieldset>
          <legend>Dados de acesso</legend>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required aria-label="Email">

          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" required aria-label="Senha">

        </fieldset>

        <button type="submit">Cadastrar</button>

      </form>

    </section>
  </main>

</body>
</html>
