<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ConectaServiços</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="container">
    <a href="index.html">ConectaServiço</a>
  </div>
</header>

<section class="login">
  <div class="container">

    <h2>Entrar na sua conta</h2>

    <form>
      <label for="email">Email</label>
  <input id="email" type="email" placeholder="Digite seu email" required>

  <label for="senha">Senha</label>
  <input id="senha" type="password" placeholder="Digite sua senha" required>

  <button type="submit">Entrar</button>
    </form>
<p>Não tem conta? <a href="#">Cadastre-se</a></p>
  </div>
</section>

</body>
</html>
